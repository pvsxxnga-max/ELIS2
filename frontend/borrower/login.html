<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-LIS | ผู้ขอสินเชื่อ</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="login-container">
        <div class="text-center">
            <i class="fa-solid fa-building-columns" style="font-size: 48px; color: var(--primary-color);"></i>
            <h2 style="color: var(--primary-color); margin-top: 15px; margin-bottom: 5px;">e-LIS</h2>
            <p style="color: var(--text-muted); margin-top: 0; margin-bottom: 30px;">ระบบสารสนเทศเพื่อการบริหารสินเชื่อ</p>
        </div>

        <form id="borrowerForm" onsubmit="event.preventDefault();">
            <div class="form-group">
                <label><i class="fa-solid fa-user"></i> ชื่อผู้ใช้ (ผู้กู้)</label>
                <input type="text" class="form-control" placeholder="กรอกชื่อผู้ใช้ของคุณ" required>
            </div>
            <div class="form-group">
                <label><i class="fa-solid fa-lock"></i> รหัสผ่าน</label>
                <input type="password" class="form-control" placeholder="กรอกรหัสผ่าน" required>
            </div>
            <button type="submit" class="btn btn-primary">เข้าสู่ระบบ</button>
        </form>

        <hr class="divider">

        <button onclick="loginWithGoogle()" class="btn btn-outline" style="margin-bottom: 15px;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google" style="width: 20px; vertical-align: middle; margin-right: 8px;">
            ลงทะเบียน / เข้าสู่ระบบด้วย Google
        </button>

        <div class="text-center">
            <a href="../officer/login.html" style="color: var(--text-muted); text-decoration: none; font-size: 18px;">
                <i class="fa-solid fa-user-shield"></i> สำหรับเจ้าหน้าที่และผู้บริหาร
            </a>
        </div>
    </div>

    <script>
        function loginWithGoogle() {
            Swal.fire({
                title: 'กำลังเชื่อมต่อบัญชี Google',
                text: 'กรุณารอสักครู่...',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            setTimeout(() => {
                Swal.fire({
                    icon: 'success',
                    title: 'ผูกบัญชีสำเร็จ!',
                    text: 'คุณต้องการกรอกข้อมูลส่วนตัวเลยหรือไม่?',
                    showCancelButton: true,
                    confirmButtonText: '<i class="fa-solid fa-pen-to-square"></i> กรอกข้อมูลตอนนี้',
                    cancelButtonText: 'ข้ามไปแดชบอร์ด',
                    confirmButtonColor: '#1B365D',
                    cancelButtonColor: '#64748B'
                }).then((result) => {
                    if (result.isConfirmed) {
                        window.location.href = 'profile.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                });
            }, 1500);
        }
    </script>
</body>
</html>
